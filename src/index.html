<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NutriTrack — Regista o que comes em linguagem natural e acompanha os teus macros com AI." />
  <title>NutriTrack — Food Tracker com AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>" />
  <link rel="stylesheet" href="./index.css" />
</head>
<body>

  <!-- Custom Cursor -->
  <div class="cursor cursor-ring" id="cursor-ring"></div>
  <div class="cursor cursor-dot"  id="cursor-dot"></div>

  <div id="app"></div>

  <script type="module" src="./main.js"></script>

  <script>
    // Custom cursor
    const dot  = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX; mouseY = e.clientY;
      dot.style.left  = mouseX + 'px';
      dot.style.top   = mouseY + 'px';
    });

    // Ring follows with slight delay
    function animateRing() {
      ringX += (mouseX - ringX) * 0.12;
      ringY += (mouseY - ringY) * 0.12;
      ring.style.left = ringX + 'px';
      ring.style.top  = ringY + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();

    // Expand on hover
    document.querySelectorAll('a, button, [role="button"], .clickable-item, .meal-btn, .date-nav-btn').forEach(el => {
      el.addEventListener('mouseenter', () => ring.classList.add('hovering'));
      el.addEventListener('mouseleave', () => ring.classList.remove('hovering'));
    });

    // Also listen for dynamically added interactive elements
    document.addEventListener('mouseover', e => {
      const tag = e.target.tagName;
      if (['BUTTON','A','INPUT','TEXTAREA','SELECT'].includes(tag) || e.target.classList.contains('clickable-item')) {
        ring.classList.add('hovering');
      } else {
        ring.classList.remove('hovering');
      }
    });
  </script>
</body>
</html>
